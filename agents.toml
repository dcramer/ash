[[skills]]
name = "pr-writer"
source = "getsentry/skills"

[[skills]]
name = "agents-md"
source = "getsentry/skills"

[[skills]]
name = "*"
source = "dcramer/dex"

[[skills]]
name = "brand-guidelines"
source = "getsentry/skills"
